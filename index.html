<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            background: white;
        }

        /* Sidebar */
        .sidebar {
            width: 50%;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e9ecef;
        }

        .user-header {
            padding: 20px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e9ecef;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-placeholder {
            width: 50px;
            height: 50px;
            background: #e9ecef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #666;
        }

        .user-name {
            font-size: 18px;
            font-weight: 700;
            color: #000;
        }

        .search-container {
            padding: 20px;
            background: white;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #f1f3f4;
            border-radius: 25px;
            padding: 12px 20px;
            gap: 12px;
        }

        .search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-size: 15px;
        }

        .new-chat-btn {
            width: 100%;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            display: none;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f1f3f4;
        }

        .chat-item:hover {
            background: #f8f9fa;
        }

        .chat-item.active {
            background: #e7f3ff;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .chat-last-message {
            font-size: 14px;
            color: #666;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .empty-title {
            font-size: 20px;
            color: #8b5cf6;
            font-weight: 600;
            margin: 20px 0 10px;
        }

        /* Welcome Area */
        .welcome-area {
            flex: 1;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-content {
            text-align: center;
        }

        .welcome-title {
            font-size: 28px;
            color: #202124;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: #9aa0a6;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            background: #efeae2;
            display: none;
            flex-direction: column;
        }

        .chat-header {
            background: #f0f2f5;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e9edef;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .chat-header-name {
            font-weight: 500;
            font-size: 16px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            display: flex;
            margin-bottom: 15px;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .message.sent .message-bubble {
            background: #d9fdd3;
        }

        .message.received .message-bubble {
            background: white;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 5px;
        }

        .message-time {
            font-size: 11px;
            color: #667781;
        }

        /* Message Input */
        .message-input-container {
            background: #f0f2f5;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .input-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #54656f;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }

        .input-btn:hover {
            background: #e4e6ea;
        }

        .input-btn.active {
            background: #8b5cf6;
            color: white;
        }

        .message-input {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            background: white;
            font-size: 14px;
            outline: none;
            resize: none;
        }

        .send-btn {
            background: #25d366;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
        }

        /* Emoji Picker */
        .emoji-picker {
            position: absolute;
            bottom: 70px;
            left: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 20px;
            width: 350px;
            max-height: 400px;
            display: none;
            z-index: 1000;
        }

        .emoji-picker.show {
            display: block;
        }

        .emoji-picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e9ecef;
        }

        .emoji-picker-title {
            font-size: 16px;
            font-weight: 600;
        }

        .emoji-picker-close {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
        }

        .emoji-categories {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        .emoji-category {
            background: #f8f9fa;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .emoji-category.active {
            background: #8b5cf6;
            color: white;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            max-height: 200px;
            overflow-y: auto;
        }

        .emoji-item {
            background: none;
            border: none;
            font-size: 24px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }

        .emoji-item:hover {
            background: #f1f3f4;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            margin: 20px 0;
            outline: none;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin: 0 5px;
        }

        .modal-btn.primary {
            background: #8b5cf6;
            color: white;
        }

        .modal-btn.secondary {
            background: #e9ecef;
            color: #333;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
            }
            
            .welcome-area {
                display: none;
            }

            .chat-area {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 1000;
            }

            .emoji-picker {
                width: calc(100% - 40px);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="user-header">
                <div class="user-info">
                    <div class="avatar-placeholder" id="userAvatar">U</div>
                    <h2 class="user-name" id="userName">USER NAME</h2>
                </div>
            </div>

            <div class="search-container">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" placeholder="Search chats..." class="search-input" id="searchInput">
                </div>
            </div>

            <button class="new-chat-btn" onclick="startNewChat()">
                <span>+ ✨ New Chat</span>
            </button>

            <div class="chat-list" id="chatList"></div>

            <div class="empty-state" id="emptyState">
                <div style="font-size: 48px;">💬</div>
                <h3 class="empty-title">No chats found</h3>
                <p>Start a new conversation</p>
            </div>
        </div>

        <!-- Welcome Area -->
        <div class="welcome-area" id="welcomeArea">
            <div class="welcome-content">
                <div style="font-size: 60px; margin-bottom: 20px;">👤</div>
                <h2 class="welcome-title">Welcome to ChatApp</h2>
                <p class="welcome-subtitle">Select a chat to start messaging</p>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
                <div class="chat-header-name" id="chatHeaderName"></div>
            </div>
            
            <div class="chat-messages" id="chatMessages"></div>
            
            <div class="message-input-container">
                <button class="input-btn" id="emojiBtn" onclick="toggleEmojiPicker()">😊</button>
                <textarea class="message-input" id="messageInput" placeholder="Type a message" rows="1"></textarea>
                <button class="send-btn" onclick="sendMessage()">➤</button>

                <!-- Emoji Picker -->
                <div class="emoji-picker" id="emojiPicker">
                    <div class="emoji-picker-header">
                        <h3 class="emoji-picker-title">Choose an emoji</h3>
                        <button class="emoji-picker-close" onclick="closeEmojiPicker()">✕</button>
                    </div>
                    
                    <div class="emoji-categories">
                        <button class="emoji-category active" onclick="showEmojiCategory('smileys')">😀</button>
                        <button class="emoji-category" onclick="showEmojiCategory('hearts')">❤️</button>
                        <button class="emoji-category" onclick="showEmojiCategory('gestures')">👍</button>
                        <button class="emoji-category" onclick="showEmojiCategory('animals')">🐶</button>
                        <button class="emoji-category" onclick="showEmojiCategory('food')">🍎</button>
                    </div>
                    
                    <div class="emoji-grid" id="emojiGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Start New Chat</h3>
            <input type="text" class="modal-input" id="modalInput" placeholder="Enter contact name">
            <div>
                <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
                <button class="modal-btn primary" onclick="saveModal()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // App state
        let chats = [];
        let currentChatId = null;

        // Emoji data
        const emojis = {
            smileys: ['😀', '😃', '😄', '😁', '😆', '😅', '🤣', '😂', '🙂', '🙃', '😉', '😊', '😇', '🥰', '😍', '🤩', '😘', '😗', '😚', '😙', '😋', '😛', '😜', '🤪', '😝', '🤑', '🤗', '🤭', '🤫', '🤔'],
            hearts: ['❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎', '💔', '❣️', '💕', '💞', '💓', '💗', '💖', '💘', '💝', '💟'],
            gestures: ['👍', '👎', '👌', '✌️', '🤞', '🤟', '🤘', '👏', '🙌', '👐', '🤲', '🤝', '🙏', '✊', '👊', '🤛', '🤜', '👋', '🤚', '🖐️', '✋', '🖖', '👆', '🖕', '👇', '☝️', '👈', '👉'],
            animals: ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐽', '🐸', '🐵', '🙈', '🙉', '🙊', '🐒', '🐔', '🐧', '🐦', '🐤', '🐣', '🐥', '🦆', '🦅', '🦉', '🦇'],
            food: ['🍎', '🍐', '🍊', '🍋', '🍌', '🍉', '🍇', '🍓', '🍈', '🍒', '🍑', '🥭', '🍍', '🥥', '🥝', '🍅', '🍆', '🥑', '🥦', '🥬', '🥒', '🌶️', '🌽', '🥕', '🧄', '🧅', '🥔', '🍠', '🥐', '🥯']
        };

        // Initialize
        function init() {
            updateUI();
            setupEventListeners();
        }

        function updateUI() {
            const emptyState = document.getElementById('emptyState');
            const chatList = document.getElementById('chatList');
            
            if (chats.length === 0) {
                emptyState.style.display = 'flex';
                chatList.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                chatList.style.display = 'block';
                renderChatList();
            }
        }

        function renderChatList() {
            const chatList = document.getElementById('chatList');
            chatList.innerHTML = '';
            
            chats.forEach(chat => {
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-item';
                chatItem.onclick = () => openChat(chat.id);
                
                const lastMessage = chat.messages.length > 0 ? chat.messages[chat.messages.length - 1] : null;
                
                chatItem.innerHTML = `
                    <div class="chat-avatar" style="background-color: ${chat.color}">
                        ${chat.avatar}
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">${chat.name}</div>
                        <div class="chat-last-message">${lastMessage ? lastMessage.text : 'No messages yet'}</div>
                    </div>
                `;
                
                chatList.appendChild(chatItem);
            });
        }

        function startNewChat() {
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function saveModal() {
            const input = document.getElementById('modalInput').value.trim();
            if (!input) return;
            
            const newChat = {
                id: Date.now(),
                name: input,
                avatar: input.charAt(0).toUpperCase(),
                color: getRandomColor(),
                messages: []
            };
            
            chats.push(newChat);
            updateUI();
            openChat(newChat.id);
            closeModal();
            document.getElementById('modalInput').value = '';
        }

        function getRandomColor() {
            const colors = ['#e91e63', '#2196f3', '#ff9800', '#4caf50', '#9c27b0'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function openChat(chatId) {
            currentChatId = chatId;
            const chat = chats.find(c => c.id === chatId);
            if (!chat) return;
            
            document.getElementById('welcomeArea').style.display = 'none';
            document.getElementById('chatArea').style.display = 'flex';
            
            document.getElementById('chatHeaderName').textContent = chat.name;
            document.getElementById('chatHeaderAvatar').textContent = chat.avatar;
            document.getElementById('chatHeaderAvatar').style.backgroundColor = chat.color;
            
            renderMessages(chat);
            
            // Update active chat
            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));
            const chatItems = document.querySelectorAll('.chat-item');
            const chatIndex = chats.findIndex(c => c.id === chatId);
            if (chatItems[chatIndex]) {
                chatItems[chatIndex].classList.add('active');
            }
        }

        function renderMessages(chat) {
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.innerHTML = '';
            
            chat.messages.forEach(message => {
                const messageElement = document.createElement('div');
                messageElement.className = `message ${message.sent ? 'sent' : 'received'}`;
                
                messageElement.innerHTML = `
                    <div class="message-bubble">
                        <div class="message-text">${message.text}</div>
                        <div class="message-time">${new Date(message.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                    </div>
                `;
                
                messagesContainer.appendChild(messageElement);
            });
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentChatId) return;
            
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            
            const message = {
                id: Date.now(),
                text: text,
                sent: true,
                timestamp: Date.now()
            };
            
            chat.messages.push(message);
            input.value = '';
            
            renderMessages(chat);
            updateUI();
            closeEmojiPicker();
            
            // Auto-reply
            setTimeout(() => {
                const replies = [
                    "That's interesting! 🤔",
                    "Thanks! 😊",
                    "How's your day? 🌟",
                    "Sounds good! ✨",
                    "Great! 👍"
                ];
                
                const reply = {
                    id: Date.now(),
                    text: replies[Math.floor(Math.random() * replies.length)],
                    sent: false,
                    timestamp: Date.now()
                };
                
                chat.messages.push(reply);
                renderMessages(chat);
                updateUI();
            }, 1000 + Math.random() * 2000);
        }

        // Emoji Picker Functions
        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            const btn = document.getElementById('emojiBtn');
            
            if (picker.classList.contains('show')) {
                closeEmojiPicker();
            } else {
                showEmojiPicker();
            }
        }

        function showEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            const btn = document.getElementById('emojiBtn');
            
            picker.classList.add('show');
            btn.classList.add('active');
            showEmojiCategory('smileys');
        }

        function closeEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            const btn = document.getElementById('emojiBtn');
            
            picker.classList.remove('show');
            btn.classList.remove('active');
        }

        function showEmojiCategory(category) {
            const grid = document.getElementById('emojiGrid');
            grid.innerHTML = '';
            
            const categoryEmojis = emojis[category] || [];
            
            categoryEmojis.forEach(emoji => {
                const button = document.createElement('button');
                button.className = 'emoji-item';
                button.textContent = emoji;
                button.onclick = () => insertEmoji(emoji);
                grid.appendChild(button);
            });
            
            // Update active category
            document.querySelectorAll('.emoji-category').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function insertEmoji(emoji) {
            const input = document.getElementById('messageInput');
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const text = input.value;
            
            input.value = text.substring(0, start) + emoji + text.substring(end);
            input.selectionStart = input.selectionEnd = start + emoji.length;
            input.focus();
        }

        function setupEventListeners() {
            // Message input enter key
            document.getElementById('messageInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Click outside to close emoji picker
            document.addEventListener('click', (e) => {
                const picker = document.getElementById('emojiPicker');
                const btn = document.getElementById('emojiBtn');
                
                if (picker.classList.contains('show') && 
                    !picker.contains(e.target) && 
                    !btn.contains(e.target)) {
                    closeEmojiPicker();
                }
            });

            // Modal click outside to close
            document.getElementById('modal').addEventListener('click', (e) => {
                if (e.target.id === 'modal') {
                    closeModal();
                }
            });
        }

        // Initialize app
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
